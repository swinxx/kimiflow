name: ci

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Shell syntax (bash -n) — hard gate
        run: |
          for f in hooks/*.sh; do
            echo "checking $f"
            bash -n "$f"
          done

      - name: Unit tests (resolve-verbosity) — hard gate
        run: bash hooks/test-resolve-verbosity.sh

      - name: Unit tests (resolve-build-gate) — hard gate
        run: bash hooks/test-resolve-build-gate.sh

      - name: Unit tests (commit-secret-gate) — hard gate
        run: bash hooks/test-commit-secret-gate.sh

      - name: Unit tests (weakening-scan) — hard gate
        run: bash hooks/test-weakening-scan-unit.sh

      - name: Unit tests (secret-content-scan) — hard gate
        run: bash hooks/test-secret-content-scan.sh

      - name: Unit tests (test-gate) — hard gate
        run: bash hooks/test-gate-unit.sh

      - name: Unit tests (state-gate) — hard gate
        run: bash hooks/test-state-gate.sh

      - name: Unit tests (launcher-status) — hard gate
        run: bash hooks/test-launcher-status.sh

      - name: Unit tests (working-tree-gate) — hard gate
        run: bash hooks/test-working-tree-gate.sh

      - name: Unit tests (red-green-gate) — hard gate
        run: bash hooks/test-red-green-gate.sh

      - name: Unit tests (local diagnostics) — hard gate
        run: bash hooks/test-lsp-diagnostics.sh

      - name: Unit tests (review-gate) — hard gate
        run: bash hooks/test-resolve-review-gate.sh

      - name: Validate JSON — hard gate
        run: |
          jq -e . hooks/hooks.json > /dev/null
          jq -e . hooks.json > /dev/null
          jq -e . .claude-plugin/plugin.json > /dev/null
          jq -e . .claude-plugin/marketplace.json > /dev/null
          jq -e . .codex-plugin/plugin.json > /dev/null
          jq -e . .agents/plugins/marketplace.json > /dev/null

      - name: Claude install smoke-test (structural) — hard gate
        run: bash hooks/smoke-install.sh

      - name: Codex install smoke-test (structural) — hard gate
        run: bash hooks/smoke-install-codex.sh

      - name: ShellCheck (informational)
        run: shellcheck hooks/*.sh || true
